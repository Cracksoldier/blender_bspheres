name: Release extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version X.Y.Z (sets manifest version, tag v<version>, and release)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release (dev build)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # commit the version bump, push the tag, create the release

env:
  BLENDER_VERSION: "4.2.3"   # 4.2 LTS; bump as desired

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version input
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::version must be X.Y.Z"; exit 1; }

      - name: Bump manifest version
        run: |
          sed -i -E 's/^version = ".*"/version = "${{ inputs.version }}"/' blender_manifest.toml
          grep -E '^version =' blender_manifest.toml

      - name: Install Blender runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxxf86vm1 libxfixes3 libxi6 libxkbcommon0 libxrender1 \
            libxext6 libsm6 libgl1

      - name: Download Blender
        run: |
          base="blender-${BLENDER_VERSION}-linux-x64"
          series="Blender${BLENDER_VERSION%.*}"
          wget -q -P /tmp "https://download.blender.org/release/${series}/${base}.tar.xz"
          tar -xf "/tmp/${base}.tar.xz" -C /tmp
          echo "/tmp/${base}" >> "$GITHUB_PATH"

      - name: Validate & build extension
        run: |
          blender --command extension validate .
          blender --command extension build \
            --source-dir . --output-filepath "bspheres-${{ inputs.version }}.zip"

      # Regenerate the remote-repository index served via GitHub Pages so
      # installed copies see this release as an in-place update. The hash must
      # match the exact zip uploaded as the release asset below. Skipped for
      # pre-releases so dev builds are not pushed to all users as updates.
      - name: Generate extensions repository index
        if: ${{ !inputs.prerelease }}
        run: |
          python3 - <<'EOF'
          import hashlib, json, tomllib
          from pathlib import Path

          version = "${{ inputs.version }}"
          repo = "${{ github.repository }}"
          zip_path = Path(f"bspheres-{version}.zip")
          manifest = tomllib.loads(Path("blender_manifest.toml").read_text(encoding="utf-8"))

          entry = {
              "schema_version": manifest["schema_version"],
              "id": manifest["id"],
              "name": manifest["name"],
              "tagline": manifest["tagline"],
              "version": manifest["version"],
              "type": manifest["type"],
              "maintainer": manifest["maintainer"],
              "license": manifest["license"],
              "blender_version_min": manifest["blender_version_min"],
              "tags": manifest["tags"],
              "website": f"https://{repo.split('/')[0].lower()}.github.io/{repo.split('/')[1]}/",
              "archive_url": f"https://github.com/{repo}/releases/download/v{version}/{zip_path.name}",
              "archive_size": zip_path.stat().st_size,
              "archive_hash": "sha256:" + hashlib.sha256(zip_path.read_bytes()).hexdigest(),
          }
          index = {"version": "v1", "blocklist": [], "data": [entry]}
          Path("docs/index.json").write_text(json.dumps(index, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          EOF
          cat docs/index.json

      - name: Commit bump, tag, push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blender_manifest.toml docs/index.json
          git diff --cached --quiet || git commit -m "Release v${{ inputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "Tag v${{ inputs.version }} already exists on remote, skipping"
          else
            git tag "v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "bSpheres NX v${{ inputs.version }}"
          files: "bspheres-${{ inputs.version }}.zip"
          fail_on_unmatched_files: true
          prerelease: ${{ inputs.prerelease }}
