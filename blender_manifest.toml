schema_version = "1.0.0"

id = "bspheres"
version = "1.3.1"
name = "bSpheres NX"
tagline = "zSpheres-style base mesh creation — upgraded"
maintainer = "Cracksoldier"

type = "add-on"

blender_version_min = "4.2.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

tags = ["Mesh", "Modeling"]

[build]
# Replaces Blender's defaults, so the default excludes are re-listed here.
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/.github/",
  "/.claude/",
  "/docs/",
  "/CLAUDE.md",
  "*.zip",
]
